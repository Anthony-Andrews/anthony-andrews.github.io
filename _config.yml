# Setup
title: Anthony Andrews
url: https://getpoole.com
paginate: 1
baseurl: ""
permalink: pretty

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
ga_analytics: G-P9JFVGV791 #replace later with self hosted?

# Specify the author for blog posts
author:
  name: Anthony Andrews
  url: anthony-andrews.github.io
  email: anthony.r.andrews@gmail.com

# Custom vars
version: 3.0.0

# Navbar page list
nav:
  - title: Projects
    url: /projects

  - title: About
    url: /about

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-gist
